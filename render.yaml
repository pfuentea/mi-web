services:
  - type: web
    name: mi-web
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate --no-input && python manage.py collectstatic --no-input
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mis-cuotas-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: False
